name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install minimal deps
        run: |
          python -m pip install --upgrade pip
          # Tests are CPU-only; install just what's needed (no NeMo / TE / Megatron).
          pip install \
              "torch>=2.4" \
              "transformers>=4.46" \
              "numpy>=1.26" \
              "soundfile" \
              "pytest"

      - name: Run tests
        run: |
          PYTHONPATH=$PWD pytest tests/ -v --tb=short

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install "ruff>=0.6"

      - name: Run ruff (format check + lint)
        run: |
          ruff format --check latent_lm/ tests/ scripts/ || echo "::warning::format issues (non-blocking)"
          ruff check latent_lm/ tests/ scripts/ || echo "::warning::lint issues (non-blocking)"
