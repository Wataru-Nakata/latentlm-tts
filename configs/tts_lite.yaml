# LatentLM TTS — lightweight, no-container config (plain-PyTorch TorchBackbone).
# Trains with nothing but `pip install` (no NeMo/Megatron/transformer-engine):
#   torchrun --nproc_per_node=1 -m latent_lm.train_lite --config configs/tts_lite.yaml
# Stream Emilia (cache_dir: null) or point cache_dir at pre-encoded shards from
# scripts/cache_latents.py.

model:
  # Lite path: a plain-torch RoPE transformer (no HF/Megatron backbone).
  lite:
    hidden_dim: 768
    n_layers: 12
    n_heads: 12
    ffn_mult: 4
  latent_dim: 64
  diff_head_layers: 3
  diff_head_ffn_mult: 4
  dtype: bfloat16

tokenizer:
  text: Qwen/Qwen2.5-0.5B            # used only for its vocab + tokenization
  audio: microsoft/VibeVoice-AcousticTokenizer

data:
  dataset_id: amphion/Emilia-Dataset
  config_name: null
  split: train
  languages: [en]
  min_audio_seconds: 1.0
  max_audio_seconds: 20.0
  shuffle_buffer: 1000
  num_workers: 2
  max_text_tokens: 256
  max_latent_frames: 200
  cache_dir: null                   # null = stream Emilia + VibeVoice-encode on GPU
  pin_memory: true

loss:
  alpha_diff: 1.0
  ce_chunk_size: 0
  ddpm:
    num_timesteps: 1000
    schedule: cosine
    timesteps_per_forward: 4
    prediction_type: v_prediction

optim:
  lr: 3.0e-4
  weight_decay: 0.1
  betas: [0.9, 0.95]
  grad_clip: 1.0
  warmup_steps: 500
  max_steps: 100000

precision:
  params_dtype: bfloat16

runtime:
  micro_batch_size: 4
  packed_total_length: 8192         # sequence packing length (0 = pad-per-batch)
  gradient_accumulation_steps: 1
  log_every_n_steps: 20
  checkpoint_every_n_steps: 2000
  keep_last_k_checkpoints: 3

paths:
  output_dir: ${oc.env:LATENT_LM_OUTPUT_DIR,outputs/tts_lite}
  hf_cache_dir: ${oc.env:HF_HOME,'~/.cache/huggingface'}
